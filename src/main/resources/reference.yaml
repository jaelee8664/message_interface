# Message Interface Reference Configuration
workflow:
  editPassword: admin   # 워크플로우 수정 비밀번호

kafka:
  bootstrapServers: localhost:9092
  # consumers are configured per workflow unit via Node0Definition

grpc:
  server:
    port: 9090

tcp:
  server:
    port: 9091
    idleTimeoutSeconds: 60   # 마지막 수신 후 이 시간(초) 동안 데이터가 없으면 연결 종료 (0 = 비활성화)

log:
  retentionDays: 7
  maxSizeGb: 10
  directory: message-logs

history:
  maxVersions: 10
  directory: workflow-history
