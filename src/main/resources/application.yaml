workflow:
  editPassword: ${WORKFLOW_EDIT_PASSWORD:admin}

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9090}

spring:
  application:
    name: message-interface
  autoconfigure:
    exclude:
      - org.springframework.boot.kafka.autoconfigure.KafkaAutoConfiguration
  mongodb:
    uri: mongodb://localhost:27017/message_interface?serverSelectionTimeoutMS=3000&connectTimeoutMS=3000
    auto-index-creation: false

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    com.synapse: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
